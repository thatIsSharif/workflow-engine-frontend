<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 1</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem 3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .expression {
      font-size: 1.5rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .result {
      font-size: 3rem;
      font-weight: bold;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="expression">6 - 1 + 2 =</div>
    <div class="result">7</div>
  </div>
</body>
</html>
