<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Sum - KAN-156</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 3rem 4rem;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .expression {
            font-size: 2rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        .result {
            font-size: 4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="expression">18 + 9 - 1 + 7</div>
        <div class="result">= 33</div>
    </div>
</body>
</html>
