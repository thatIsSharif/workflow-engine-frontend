<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN-160 Test HTML</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .expression {
            font-size: 1.5rem;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .result {
            font-size: 4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="expression">8 + 9 - 1 + 7 + 0 + 8 =</div>
        <div class="result" id="result"></div>
    </div>
    <script>
        document.getElementById('result').textContent = 8 + 9 - 1 + 7 + 0 + 8;
    </script>
</body>
</html>
