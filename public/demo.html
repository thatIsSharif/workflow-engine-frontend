<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN-167 Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin: 0 0 1rem; }
        .result {
            font-size: 4rem;
            font-weight: bold;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>5 + 1 = <span class="result">6</span></h1>
    </div>
</body>
</html>
